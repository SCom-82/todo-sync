services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: todo_sync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:devpassword@db:5432/todo_sync
      MS_CLIENT_ID: ${MS_CLIENT_ID:-}
      MS_TENANT_ID: consumers
      SYNC_INTERVAL_SECONDS: "300"
      LOG_LEVEL: INFO
    depends_on:
      - db

volumes:
  pgdata:
